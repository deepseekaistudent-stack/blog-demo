<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #0a0a1a; padding: 20px; }
        .forgot-container { width: 100%; max-width: 420px; }
        .forgot-card { background: rgba(255, 255, 255, 0.97); border-radius: 24px; padding: 40px 36px 32px; box-shadow: 0 20px 60px rgba(0, 20, 30, 0.12); transition: transform 0.25s ease; }
        .forgot-card:hover { transform: translateY(-2px); }
        .forgot-title { font-size: 28px; font-weight: 700; color: #0a1e2e; letter-spacing: -0.5px; margin-bottom: 6px; }
        .forgot-subtitle { color: #5c7a8e; font-size: 15px; margin-bottom: 28px; border-bottom: 1px solid #eef3f7; padding-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; color: #1d3b4f; margin-bottom: 6px; }
        .input-icon-wrapper { position: relative; }
        .input-icon-wrapper .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #8aa4b8; font-size: 16px; pointer-events: none; transition: color 0.2s; }
        .input-icon-wrapper input { width: 100%; padding: 12px 16px 12px 44px; font-size: 15px; border: 1.5px solid #dde7ed; border-radius: 12px; background: #f9fcfe; transition: border-color 0.2s, box-shadow 0.2s; color: #0a1e2e; font-family: inherit; }
        .input-icon-wrapper input:focus { outline: none; border-color: #ff9800; background: #ffffff; box-shadow: 0 0 0 4px rgba(255, 152, 0, 0.12); }
        .input-icon-wrapper input::placeholder { color: #a5bfd0; }
        .reset-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #ff9800 0%, #e65100 100%); border: none; border-radius: 12px; color: white; font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.25s ease; box-shadow: 0 6px 18px rgba(255, 152, 0, 0.30); margin-top: 8px; font-family: inherit; }
        .reset-btn:hover { background: linear-gradient(135deg, #f57c00 0%, #d84315 100%); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255, 152, 0, 0.40); }
        .reset-btn:active { transform: scale(0.98); }
        .error-message { background: #fff0f0; border-left: 4px solid #e74c3c; padding: 10px 14px; border-radius: 8px; color: #c0392b; font-size: 14px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
        .success-message { background: #f0faf0; border-left: 4px solid #4caf50; padding: 10px 14px; border-radius: 8px; color: #2e7d32; font-size: 14px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
        .footer-links { margin-top: 20px; text-align: center; font-size: 14px; color: #7b98ad; }
        .footer-links a { color: #ff9800; text-decoration: none; font-weight: 500; }
        .footer-links a:hover { text-decoration: underline; }
            canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div style="position:relative;z-index:1;">
<div class="forgot-container">
    <div class="forgot-card">
        <div class="forgot-title">忘记密码</div>
        <div class="forgot-subtitle">输入用户名并设置新密码以重置</div>
        <div th:if="${error}" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="success-message">
            <i class="fas fa-check-circle"></i>
            <span th:text="${success}"></span>
        </div>
        <form th:action="@{/forgot-password}" method="post">
            <div class="form-group">
                <label for="username">用户名</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-user icon"></i>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required />
                </div>
            </div>
            <div class="form-group">
                <label for="newPassword">新密码</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="newPassword" name="newPassword" placeholder="请设置新密码（至少6位）" required minlength="6" />
                </div>
            </div>
            <input type="hidden" name="_csrf" th:value="${_csrf}" />
            <button type="submit" class="reset-btn">重置密码</button>
            <div class="footer-links">
                <a href="/login">返回登录</a>
            </div>
        </form>
    </div>
</div>
</div>
<script>
    (function() {
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        const PARTICLE_COUNT = 100;
        const CONNECTION_DISTANCE = 150;
        const MOUSE_RADIUS = 120;
        const mouse = { x: -9999, y: -9999, isActive: false };
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; mouse.isActive = true; });
        window.addEventListener('mouseleave', function() { mouse.isActive = false; });
        window.addEventListener('touchmove', function(e) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; mouse.isActive = true; }, { passive: true });
        window.addEventListener('touchend', function() { mouse.isActive = false; });
        function random(min, max) { return Math.random() * (max - min) + min; }
        class Particle {
            constructor() { this.reset(); }
            reset() { this.x = random(0, width); this.y = random(0, height); this.vx = random(-0.8, 0.8); this.vy = random(-0.8, 0.8); this.radius = random(1.5, 3.5); this.opacity = random(0.4, 0.9); }
            update() {
                if (mouse.isActive) { const dx = this.x - mouse.x; const dy = this.y - mouse.y; const dist = Math.sqrt(dx * dx + dy * dy); if (dist < MOUSE_RADIUS && dist > 0) { const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS; const angle = Math.atan2(dy, dx); this.vx += Math.cos(angle) * force * 0.15; this.vy += Math.sin(angle) * force * 0.15; } }
                this.x += this.vx; this.y += this.vy; this.vx *= 0.998; this.vy *= 0.998;
                if (this.x < 0 || this.x > width) this.vx *= -1; if (this.y < 0 || this.y > height) this.vy *= -1;
                this.x = Math.max(0, Math.min(width, this.x)); this.y = Math.max(0, Math.min(height, this.y));
            }
            draw(ctx) { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = 'rgba(120, 180, 255,' + this.opacity + ')'; ctx.fill(); }
        }
        function initParticles() { particles = []; for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle()); }
        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const a = particles[i], b = particles[j];
                    const dx = a.x - b.x, dy = a.y - b.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < CONNECTION_DISTANCE) {
                        const alpha = (1 - dist / CONNECTION_DISTANCE) * 0.35;
                        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
                        ctx.strokeStyle = 'rgba(100, 160, 240,' + alpha + ')'; ctx.lineWidth = 0.6; ctx.stroke();
                    }
                }
            }
        }
        function drawMouseConnections() {
            if (!mouse.isActive) return;
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                const dx = p.x - mouse.x, dy = p.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < CONNECTION_DISTANCE) {
                    const alpha = (1 - dist / CONNECTION_DISTANCE) * 0.5;
                    ctx.beginPath(); ctx.moveTo(mouse.x, mouse.y); ctx.lineTo(p.x, p.y);
                    ctx.strokeStyle = 'rgba(160, 210, 255,' + alpha + ')'; ctx.lineWidth = 0.8; ctx.stroke();
                }
            }
        }
        function animate() {
            ctx.clearRect(0, 0, width, height);
            drawConnections(); drawMouseConnections();
            for (let i = 0; i < particles.length; i++) { particles[i].update(); particles[i].draw(ctx); }
            requestAnimationFrame(animate);
        }
        resize(); initParticles(); animate();
    })();
</script>
</body>
</html>
