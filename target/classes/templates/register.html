<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; background-size: cover; background-position: center; background-repeat: no-repeat; background-color: #e6f0f5; }
        .register-container { width: 100%; max-width: 460px; }
        .register-card { background: rgba(255, 255, 255, 0.96); border-radius: 24px; padding: 40px 36px 32px; box-shadow: 0 20px 60px rgba(0, 20, 30, 0.12); transition: transform 0.25s ease; }
        .register-card:hover { transform: translateY(-2px); }
        .register-title { font-size: 28px; font-weight: 700; color: #0a1e2e; letter-spacing: -0.5px; margin-bottom: 6px; }
        .register-subtitle { color: #5c7a8e; font-size: 15px; margin-bottom: 28px; border-bottom: 1px solid #eef3f7; padding-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; color: #1d3b4f; margin-bottom: 5px; }
        .input-icon-wrapper { position: relative; }
        .input-icon-wrapper .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #8aa4b8; font-size: 16px; }
        .input-icon-wrapper input, .input-icon-wrapper select { width: 100%; padding: 12px 16px 12px 44px; font-size: 15px; border: 1.5px solid #dde7ed; border-radius: 12px; background: #f9fcfe; transition: border-color 0.2s, box-shadow 0.2s; color: #0a1e2e; font-family: inherit; appearance: auto; }
        .input-icon-wrapper input:focus, .input-icon-wrapper select:focus { outline: none; border-color: #2b7dff; background: #ffffff; box-shadow: 0 0 0 4px rgba(43, 125, 255, 0.12); }
        .input-icon-wrapper input::placeholder { color: #a5bfd0; }
        .gender-group { display: flex; gap: 20px; padding-top: 6px; }
        .gender-group label { display: flex; align-items: center; gap: 6px; font-weight: 400; font-size: 15px; color: #1d3b4f; }
        .gender-group input[type="radio"] { width: 18px; height: 18px; accent-color: #2b7dff; }
        .register-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #2b7dff 0%, #1a5fc7 100%); border: none; border-radius: 12px; color: white; font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.25s ease; box-shadow: 0 6px 18px rgba(43, 125, 255, 0.30); margin-top: 8px; font-family: inherit; }
        .register-btn:hover { background: linear-gradient(135deg, #1f6eff 0%, #0f4fb7 100%); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(43, 125, 255, 0.40); }
        .register-btn:active { transform: scale(0.98); }
        .error-message { background: #fff0f0; border-left: 4px solid #e74c3c; padding: 10px 14px; border-radius: 8px; color: #c0392b; font-size: 14px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
        .success-message { background: #eafaf1; border-left: 4px solid #2ecc71; padding: 10px 14px; border-radius: 8px; color: #1a7a42; font-size: 14px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
        .footer-links { margin-top: 20px; text-align: center; font-size: 14px; color: #7b98ad; }
        .footer-links a { color: #2b7dff; text-decoration: none; font-weight: 500; }
        .footer-links a:hover { text-decoration: underline; }
        @media (max-width: 480px) { .register-card { padding: 28px 20px 24px; } }
    </style>
</head>
<body>
<div class="register-container">
    <div class="register-card">
        <div class="register-title">创建账号</div>
        <div class="register-subtitle">注册成为新用户，享受更多服务</div>
        <div th:if="${error}" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="success-message">
            <i class="fas fa-check-circle"></i>
            <span th:text="${success}"></span>
        </div>
        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label for="username">用户名</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-user icon"></i>
                    <input type="text" id="username" name="username" placeholder="请设置用户名" required />
                </div>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="password" name="password" placeholder="请设置密码（至少6位）" required minlength="6" />
                </div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-check-circle icon"></i>
                    <input type="password" id="confirmPassword" placeholder="再次输入密码" required />
                </div>
            </div>
            <div class="form-group">
                <label>性别</label>
                <div class="gender-group">
                    <label><input type="radio" name="gender" value="男" checked /> 男</label>
                    <label><input type="radio" name="gender" value="女" /> 女</label>
                </div>
            </div>
            <div class="form-group">
                <label for="addr">地址</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-map-marker-alt icon"></i>
                    <input type="text" id="addr" name="addr" placeholder="请输入您的地址" />
                </div>
            </div>
            <input type="hidden" name="_csrf" th:value="${_csrf}" />
            <button type="submit" class="register-btn">注 册</button>
            <div class="footer-links">
                <span>已有账号？</span>
                <a href="/login">立即登录</a>
            </div>
        </form>
    </div>
</div>
<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        var pwd = document.getElementById('password').value;
        var confirm = document.getElementById('confirmPassword').value;
        if (pwd !== confirm) { alert('两次输入的密码不一致！'); e.preventDefault(); }
    });
</script>
</body>
</html>
